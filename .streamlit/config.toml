[theme]
primaryColor = "#1f77b4"
backgroundColor = "#0f0f0f"
secondaryBackgroundColor = "#1a1a1a"
textColor = "#ffffff"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"
showSidebarNavigation = false

[logger]
level = "info"

[server]
headless = true
runOnSave = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
